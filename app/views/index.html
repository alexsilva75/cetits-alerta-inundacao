<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Registro de Local com Risco de Alagamento</title>

<!-- Leaflet CSS -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
    font-family: Arial, Helvetica, sans-serif;
}

#map{
    height: 400px;
    margin-bottom: 20px;
}

form{
    width: 400px;
}
</style>
</head>

<body>

<h2>Registrar ponto de risco de alagamento</h2>

<p>Clique no mapa para marcar o local.</p>

<div id="map"></div>

<form action="/salvar-local" method="POST">

<label>Latitude</label><br>
<input type="text" id="latitude" name="latitude" readonly><br><br>

<label>Longitude</label><br>
<input type="text" id="longitude" name="longitude" readonly><br><br>

<label>Descrição</label><br>
<textarea name="descricao"></textarea><br><br>

<button type="submit">Enviar</button>

</form>

<!-- Leaflet JS -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const map = L.map('map').setView([-12.5797, -38.4037], 13); // Salvador

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap'
}).addTo(map);

let marker;

// Evento de clique no mapa
map.on('click', function(e){

    const lat = e.latlng.lat;
    const lng = e.latlng.lng;

    // Atualiza formulário
    document.getElementById("latitude").value = lat;
    document.getElementById("longitude").value = lng;

    // Remove marcador anterior
    if(marker){
        map.removeLayer(marker);
    }

    // Adiciona novo marcador
    marker = L.marker([lat,lng]).addTo(map);

});

</script>

</body>
</html>
